name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-unit:
    name: Build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        run: bun run build
      - name: Unit tests
        run: bun test test/unit

  integration:
    name: Integration (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      # Installs only the @bruits/satteri-<this-platform> native binary, so this
      # job proves the napi-rs binary resolves in the extension host on each OS
      # (risk #1 in PLAN.md).
      - run: bun install --frozen-lockfile
      # @vscode/test-electron needs a display; Linux runners are headless.
      - name: Integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a bun run test:integration
      - name: Integration tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: bun run test:integration

  package:
    name: Package vsix (${{ matrix.target }})
    needs: [build-and-unit, integration]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win32-x64
          - os: macos-latest
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - name: Package (via release script)
        run: bun run scripts/release.mjs --skip-tests --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: "dist/*.vsix"
